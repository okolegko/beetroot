<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home Work 05 - Form</title>
    </head>

    <body>
        <form style="background-color: #EFEFEF; padding: 20px;" action="" id="my_form" onsubmit="alert(decodeURI(new URLSearchParams(Array.from(new FormData(document.getElementById('my_form')))).toString()));return false;">
            <p>
                <label for="fullname">Повне ім’я</label>
                <input type="text" id="fullname" name="fullname" size="30" minlength="5" placeholder="Rami Malek" required>
            </p>
            <p>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" size="30" placeholder="ramimalek@gmail.com">
            </p>
            <p>
                <label for="password1">Пароль</label>
                <input type="password" id="password1" name="password1" size="30" placeholder="Password">
            </p>
            <p>
                <label for="password2">Пароль ще раз</label>
                <input type="password" id="password2" name="password2" size="30" placeholder="Password again">
            </p>
            <span>Стать</span>
            <label><input type="radio" name="gender" value="male" checked>Чоловіча</label>
            <label><input type="radio" name="gender" value="female">Жіноча</label>
            <br>
            <span>Вік</span>
            <label><input type="number" name="age" size="6" min="1" max="150" placeholder="18"></label>
            <br>
            <span>Курс</span>
            <label><input type="select" name="course"></label>
            Виберіть Курс
            HTML5
            CSS3
            Javascript
            React 
            Angular
            NodeJS
            <br>
            <span>Повна адреса</span>
            <textarea name="address" id="" rows="3" cols="30" placeholder="Країна, регіон, місто/селище, вулиця"></textarea>           
            <br>
            <input type="checkbox">
            Я погоджуюсь з обробкою персональних даних
            <br>
            <button type="reset">Очистити форму</button>
            <button type="submit">Зареєстркуватися</button>
        </form> 
    </body>

</html>
